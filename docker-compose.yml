# PIKIT 밸런스 대시보드 — Synology DS720+ Container Manager 용 Compose
#
# 사용법:
#   1) 이 yaml 을 프로젝트 폴더에 두고 (NAS 의 /volume1/docker/pikit/)
#   2) DSM → Container Manager → 프로젝트 → 만들기 → 이 폴더 선택
#   3) 자동으로 빌드 + 실행
#
# 또는 SSH 로:
#   cd /volume1/docker/pikit && sudo docker compose up -d --build

version: "3.8"

services:
  pikit:
    build:
      context: .
      dockerfile: Dockerfile
    image: pikit-balance:latest
    container_name: pikit-balance

    ports:
      # 호스트:컨테이너 — DS720+ 의 8501 이 다른 서비스와 충돌하면 8580 등으로 변경.
      - "8501:8501"

    volumes:
      # 데이터 폴더 — NAS 에서 직접 파일 추가하면 즉시 반영. 컨테이너는 read-only.
      # 처음에 /volume1/docker/pikit/data/2026.05.06/ 같은 폴더 만들어 두면 됨.
      - ./data:/app/data:ro
      # 캐시 named volume — Parquet/pickle 자동 보존.
      # bind mount 대신 named volume 사용 — Synology Docker 가 bind source 를
      # 자동 생성 안 해주는 함정 회피, rsync --delete 와도 격리.
      - pikit_cache:/app/cache

    environment:
      # 공개 모드 — 사이드바에서 데이터 경로 입력칸 숨김 + raw CSV 다운로드 비활성화.
      - PIKIT_PUBLIC=1
      - PIKIT_DATA_ROOT=/app/data
      # PIKITbot 라이브 API URL — 같은 Docker 네트워크 안의 pikitbot 서비스.
      # default: http://pikitbot:4317 (compose 내부 DNS, 설치만 하면 자동 동작)
      - PIKIT_BOT_API_URL=${PIKIT_BOT_API_URL:-http://pikitbot:4317}

    restart: unless-stopped
    depends_on:
      - pikitbot

    # Synology 가 NAS 부팅 시 자동 시작.
    labels:
      - "com.docker.compose.synology-autostart=true"

    # 자원 제한 (선택) — DS720+ 가 6GB 까지 확장 가능. 분석 도구라 2GB 면 충분.
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ──────────────────────────────────────────────────────────────────
  # PIKITbot 대시보드 서버 — Mac 의 npm run dashboard 동등 기능을 NAS 내부에서.
  # SSH 로 Tailscale 통해 Windows 데스크탑 (100.123.168.53) 의 봇 오케스트레이터
  # 시작/중지. state.json 은 named volume 에 영구 저장.
  # ──────────────────────────────────────────────────────────────────
  pikitbot:
    image: node:20-slim
    container_name: pikitbot
    working_dir: /app

    volumes:
      # PIKITbot 소스 코드 — host 의 /volume1/docker/pikitdata/pikitbot/ 에서 mount
      - ./pikitbot:/app:rw
      # node_modules 격리 — 컨테이너 내부 named volume 으로 격리해 host 와 분리
      - pikitbot_node_modules:/app/node_modules
      # SSH key — NAS 가 Windows 데스크탑 (Tailscale) 로 SSH 할 때 사용.
      # 사용자가 host 의 /volume1/docker/pikitdata/.ssh 에 id_ed25519 (+ pub) 배치.
      - ./.ssh:/root/.ssh:ro

    environment:
      - DASHBOARD_PORT=4317
      # Playwright 의존성 — orchestrator 는 Windows 에서 돌고, NAS 측은 dashboard
      # API 만 띄우면 되므로 chromium 다운로드 스킵 (이미지 가벼워짐, 50MB→3GB 차이).
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1

    expose:
      - "4317"  # 같은 docker network 안에서만 접근 — 외부 노출 안 함

    restart: unless-stopped

    # 첫 시작: openssh-client + npm install + dashboard 서버 기동.
    # node_modules 가 이미 있으면 npm install 스킵 (빠른 재시작).
    command:
      - sh
      - -c
      - |
        set -e
        if ! command -v ssh >/dev/null 2>&1; then
          apt-get update && apt-get install -y --no-install-recommends openssh-client && rm -rf /var/lib/apt/lists/*
        fi
        if [ ! -d node_modules ] || [ ! -d node_modules/tsx ]; then
          echo "[pikitbot] npm install (첫 시작 또는 deps 변경)..."
          npm install --no-save
        fi
        # SSH known_hosts — 매번 묻지 않도록 Tailscale IP 자동 인지.
        mkdir -p /root/.ssh && chmod 700 /root/.ssh
        echo "Host *" > /root/.ssh/config
        echo "  StrictHostKeyChecking accept-new" >> /root/.ssh/config
        chmod 600 /root/.ssh/config
        exec npm run dashboard

    labels:
      - "com.docker.compose.synology-autostart=true"

# Named volumes — Docker 가 자동으로 만들고 관리.
# 컨테이너 재빌드/재시작 후에도 보존. 절대 사라지지 않음.
volumes:
  pikit_cache:
  pikitbot_node_modules:

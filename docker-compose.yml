# PIKIT 밸런스 대시보드 — Synology DS720+ Container Manager 용 Compose
#
# 사용법:
#   1) 이 yaml 을 프로젝트 폴더에 두고 (NAS 의 /volume1/docker/pikit/)
#   2) DSM → Container Manager → 프로젝트 → 만들기 → 이 폴더 선택
#   3) 자동으로 빌드 + 실행
#
# 또는 SSH 로:
#   cd /volume1/docker/pikit && sudo docker compose up -d --build

version: "3.8"

services:
  pikit:
    build:
      context: .
      dockerfile: Dockerfile
    image: pikit-balance:latest
    container_name: pikit-balance

    ports:
      # 호스트:컨테이너 — DS720+ 의 8501 이 다른 서비스와 충돌하면 8580 등으로 변경.
      - "8501:8501"

    volumes:
      # 데이터 폴더 — NAS 에서 직접 파일 추가하면 즉시 반영. 컨테이너는 read-only.
      # 처음에 /volume1/docker/pikit/data/2026.05.06/ 같은 폴더 만들어 두면 됨.
      - ./data:/app/data:ro
      # 캐시 named volume — Parquet/pickle 자동 보존.
      # bind mount 대신 named volume 사용 — Synology Docker 가 bind source 를
      # 자동 생성 안 해주는 함정 회피, rsync --delete 와도 격리.
      - pikit_cache:/app/cache

    environment:
      # 공개 모드 — 사이드바에서 데이터 경로 입력칸 숨김 + raw CSV 다운로드 비활성화.
      - PIKIT_PUBLIC=1
      - PIKIT_DATA_ROOT=/app/data
      # PIKITbot 라이브 API URL (옵션) — Mac 의 PIKITbot 대시보드 서버에 Tailscale 로
      # 접근하기 위한 URL. 미설정 시 file 기반 bot_state.json 사용 (fallback).
      # 예: http://<mac-tailscale-ip>:4317
      # NAS 호스트의 .env 파일에 적으면 docker compose 가 자동 로드.
      - PIKIT_BOT_API_URL=${PIKIT_BOT_API_URL:-}

    restart: unless-stopped

    # Synology 가 NAS 부팅 시 자동 시작.
    labels:
      - "com.docker.compose.synology-autostart=true"

    # 자원 제한 (선택) — DS720+ 가 6GB 까지 확장 가능. 분석 도구라 2GB 면 충분.
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ─────────────────────────────────────────────────────────────────
  # PIKIT Vault — Soneium 운영 지갑 모니터링 대시보드
  # 메인 사이트와 같은 이미지를 공유하고 CMD 만 다르게 실행.
  # 리버스 프록시 매핑: despell.synology.me/pikit → http://localhost:8502
  # ─────────────────────────────────────────────────────────────────
  pikit-vault:
    image: pikit-balance:latest
    container_name: pikit-vault
    depends_on:
      - pikit  # 이미지 빌드 의존
    ports:
      - "8502:8502"
    volumes:
      - pikit_vault_cache:/app/cache
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8502
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_BASEURLPATH=/vault
      - STREAMLIT_BROWSER_GATHERUSAGESTATS=false
      - PIKIT_CACHE_DIR=/app/cache
      # Soneium RPC — Tenderly 우선, 없으면 official 만 사용.
      - TENDERLY_RPC_URL=${TENDERLY_RPC_URL:-}
      # 알림 메일 설정 (.env 에 적으면 자동 로드).
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-alex@depsell.io}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
    restart: unless-stopped
    labels:
      - "com.docker.compose.synology-autostart=true"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    command:
      - streamlit
      - run
      - pikit_vault/app.py
      - --server.port=8502
      - --server.address=0.0.0.0
      - --server.headless=true
      - --server.baseUrlPath=/vault
      - --browser.gatherUsageStats=false
      # shadcn 3-색 테마 — 이 컨테이너만 적용, 메인 PIKIT 사이트 영향 없음
      - --theme.base=dark
      - --theme.primaryColor=#10b981
      - --theme.backgroundColor=#0a0a0a
      - --theme.secondaryBackgroundColor=#0a0a0a
      - --theme.textColor=#fafafa

  # ─────────────────────────────────────────────────────────────────
  # PIKIT Vault — 알림 데몬 (1분마다 잔고 체크)
  # 같은 이미지/볼륨을 공유하고 alert.py 만 무한 루프 실행.
  # 쿨다운(기본 6h)이 적용되어 1분 체크여도 메일 스팸 없음.
  # ─────────────────────────────────────────────────────────────────
  pikit-vault-alert:
    image: pikit-balance:latest
    container_name: pikit-vault-alert
    depends_on:
      - pikit
    volumes:
      # vault dashboard 와 같은 cache 폴더 공유 → alert state 일관성 유지.
      - pikit_vault_cache:/app/cache
    environment:
      - PYTHONUNBUFFERED=1
      - PIKIT_CACHE_DIR=/app/cache
      - TENDERLY_RPC_URL=${TENDERLY_RPC_URL:-}
      - ALERT_EMAIL_TO=${ALERT_EMAIL_TO:-alex@depsell.io}
      - ALERT_INTERVAL_SECONDS=${ALERT_INTERVAL_SECONDS:-60}
      - ALERT_COOLDOWN_HOURS=${ALERT_COOLDOWN_HOURS:-6}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
    restart: unless-stopped
    labels:
      - "com.docker.compose.synology-autostart=true"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    command:
      - python
      - -m
      - pikit_vault.alert
      - --daemon

# Named volumes — Docker 가 자동으로 만들고 관리.
# 컨테이너 재빌드/재시작 후에도 보존. 절대 사라지지 않음.
volumes:
  pikit_cache:
  pikit_vault_cache:
